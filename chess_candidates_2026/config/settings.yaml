# Model hyperparameters (Multiclass LightGBM - tuned for small dataset ~70 rows)
models:
  lgbm:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 4
    num_leaves: 15
    min_child_samples: 5
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.5
    reg_lambda: 1.0

# Tournament configuration
candidates_2026:
  rounds: 14
  format: "Double Round Robin"
  start_date: "2026-04-01"
  location: "Cyprus"

# Feature engineering parameters
features:
  elo:
    initial_rating: 1500
    k_factor: 20
  h2h:
    min_matches: 0
    decay_rate: 0.0005
